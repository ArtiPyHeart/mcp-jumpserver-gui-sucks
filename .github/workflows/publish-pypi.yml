name: Publish PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.inspect.outputs.package_name }}
      package_version: ${{ steps.inspect.outputs.package_version }}
      previous_version: ${{ steps.inspect.outputs.previous_version }}
      version_changed: ${{ steps.inspect.outputs.version_changed }}
      release_exists: ${{ steps.inspect.outputs.release_exists }}
      should_publish: ${{ steps.inspect.outputs.should_publish }}
      publish_reason: ${{ steps.inspect.outputs.publish_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Inspect package version and PyPI state
        id: inspect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import tomllib
          import urllib.error
          import urllib.request

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          project = pyproject["project"]
          package_name = project["name"]
          package_version = project["version"]

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          before = os.environ.get("GITHUB_EVENT_BEFORE", "")
          previous_version = ""
          version_changed = event_name == "workflow_dispatch"

          if event_name == "push" and before and before != ("0" * 40):
              try:
                  previous_pyproject = subprocess.check_output(
                      ["git", "show", f"{before}:pyproject.toml"],
                      stderr=subprocess.DEVNULL,
                  ).decode("utf-8")
              except subprocess.CalledProcessError:
                  previous_version = ""
                  version_changed = True
              else:
                  previous_data = tomllib.loads(previous_pyproject)
                  previous_version = previous_data["project"]["version"]
                  version_changed = previous_version != package_version

          release_exists = False
          try:
              with urllib.request.urlopen(
                  f"https://pypi.org/pypi/{package_name}/json",
                  timeout=15,
              ) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              release_exists = package_version in payload.get("releases", {})

          publish_requested = event_name == "workflow_dispatch" or version_changed
          should_publish = publish_requested and not release_exists

          if should_publish:
              if event_name == "workflow_dispatch":
                  publish_reason = (
                      f"Manual publish requested for {package_name} {package_version}, "
                      "and that version is not present on PyPI."
                  )
              elif previous_version:
                  publish_reason = (
                      f"Version changed from {previous_version} to {package_version}, "
                      "and the new version is not present on PyPI."
                  )
              else:
                  publish_reason = (
                      f"Version {package_version} is not present on PyPI and will be published."
                  )
          elif release_exists:
              publish_reason = (
                  f"PyPI already contains {package_name} {package_version}; skipping publish."
              )
          else:
              publish_reason = (
                  f"Version did not change on this push; current version is {package_version}."
              )

          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              def emit(key: str, value: str) -> None:
                  print(f"{key}={value}", file=handle)

              emit("package_name", package_name)
              emit("package_version", package_version)
              emit("previous_version", previous_version)
              emit("version_changed", str(version_changed).lower())
              emit("release_exists", str(release_exists).lower())
              emit("should_publish", str(should_publish).lower())
              emit("publish_reason", publish_reason)

          summary_path = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary_path.write_text(
              "\n".join(
                  [
                      "## Publish Decision",
                      f"- package: `{package_name}`",
                      f"- version: `{package_version}`",
                      f"- previous version: `{previous_version or 'n/a'}`",
                      f"- version changed: `{str(version_changed).lower()}`",
                      f"- release exists on PyPI: `{str(release_exists).lower()}`",
                      f"- should publish: `{str(should_publish).lower()}`",
                      f"- reason: {publish_reason}",
                  ]
              )
              + "\n",
              encoding="utf-8",
          )
          PY

  build:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Compile source tree
        run: python -m compileall src

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate built artifacts
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_publish == 'true'
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.prepare.outputs.package_name }}
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  no-release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_publish != 'true'
    steps:
      - name: Report skipped publish
        run: |
          echo "${{ needs.prepare.outputs.publish_reason }}"
